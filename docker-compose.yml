services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - mathom-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      # Connection string is composed from the Postgres credentials so they stay in one place.
      ConnectionStrings__Mathom: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      # Store audio on the mounted volume below. Set explicitly (absolute) so durability
      # doesn't depend on the container's working directory. Local `dotnet run` uses the
      # relative `media` default from appsettings.json instead.
      Media__Root: /app/media
      # Persist Data Protection keys on the mounted volume below so auth cookies and
      # anti-forgery tokens stay valid when the container is recreated/rebuilt.
      DataProtection__KeysPath: /keys
    # LLM provider keys (and any other overrides) come from the .env file.
    env_file:
      - .env
    volumes:
      - mathom-media:/app/media
      - mathom-dataprotection:/keys
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mathom-pgdata:
  mathom-media:
  mathom-dataprotection:
