name: Tests

# Run the test suite on PRs to main (and on main itself) so changes are gated.
# Integration tests spin up PostgreSQL via Testcontainers, so they need Docker —
# the ubuntu runner has it preinstalled.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel an in-progress run when the same ref is pushed again.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal
